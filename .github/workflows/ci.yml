name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  ci:
    name: Rust CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.96.0
          components: [rustfmt, clippy]
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry and build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Add wasm32-unknown-unknown target
        run: rustup target add wasm32-unknown-unknown

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test
        run: cargo test --workspace --all-targets --no-fail-fast

      - name: Supply-chain & license audit
        # `cargo-deny` enforces:
        #  - banned/duplicate versions
        #  - license whitelist compliance (Apache-2.0/MIT/BSD/ISC/etc.)
        #  - security advisories (RUSTSEC-*)
        # Network fetch of the RustSec advisory DB is cached by Swatinem/rust-cache.
        uses: cargo-deny/cargo-deny-action@v2
        with:
          command: check
          arguments: --all-features