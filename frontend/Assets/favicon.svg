<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Inner background (opacity 0.13 to match the transparent look on dark backgrounds) -->
  <circle cx="256" cy="256" r="206" fill="#e05d44" fill-opacity="0.13" />
  
  <!-- Outer ring (solid) -->
  <circle cx="256" cy="256" r="224" fill="none" stroke="#e05d44" stroke-width="36" />
  
  <!-- Center Snake Glyph -->
  <path d="M 180,180
           C 180,130 332,130 332,180
           C 332,240 180,240 180,300
           C 180,360 332,360 332,320
           C 332,295 300,290 280,295"
        fill="none" stroke="#e05d44" stroke-width="40" stroke-linecap="round" stroke-linejoin="round" />
        

  
  <!-- Snake Tongue -->
  <path d="M 332,320 C 352,320 362,310 372,325 M 362,310 C 367,298 375,302 380,295"
        fill="none" stroke="#e05d44" stroke-width="10" stroke-linecap="round" />
</svg>
